{% extends 'base.html' %}

{% block content %}
<div class="requestpagecontent">
    <div class="container">
        <h1>Выберите параметры даных</h1>
        <div class="input-group">
            <label>Начальная дата</label>
            <input type="date" id="startDate" name="trip-start" min="2015-01-01" onchange="checkDates('startDate')" />
        </div>
        <div class="input-group">
            <label>Конечная дата</label>
            <input type="date" id="endDate" name="trip-end" min="2015-01-01" onchange="checkDates('endDate')" />
        </div>
        <div class="input-group">
            <label>Мин. число участников</label>
            <input type="number" id="minParticipants" min="1" max="9999" value="1" onchange="validateInput('minParticipants')" />
        </div>
        <div class="input-group">
            <label>Мин. число звезд</label>
            <input type="number" id="minStars" min="0" max="99999" value="100" onchange="validateInput('minStars')" />
        </div>
        <div class="input-group">
            <label>Число репозиториев</label>
            <input type="number" id="numRepos" min="500" max="5000" value="1000" onchange="validateInput('numRepos')" />
        </div>
        <div class="input-group">
            <label>Новые репозитории</label>
            <input type="radio" name="choice" />
        </div>
        <div class="input-group radio-group">
            <label>Все репозитории</label>
            <input type="radio" name="choice" />
        </div>
        <table>
            <thead>
                <tr>
                    <th>Имя элемента</th>
                    <th>Вид разделения</th>
                    <th>Включить</th>
                </tr>
            </thead>
            <tbody>
                <!-- Здесь будут элементы, которые будет грузить django -->
            </tbody>
        </table>
        <div class="input-group">
            <label>Поле для заметки</label>
            <input type="text" />
        </div>
        <div id="notification" class="notification"></div>
        <button>Загрузить данные</button>
    </div>  
</div>
<button>Кнопка</button>
{% endblock %}
